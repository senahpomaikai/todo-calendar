<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do Calendar</title>
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e3e1db;
    --border-strong: #c9c6bd;
    --text-primary: #262624;
    --text-secondary: #6b6a66;
    --text-muted: #9c9a94;
    --accent: #c96442;
    --accent-bg: #f5e4de;
    --accent-text: #a3441f;
    --green: #3b7a45;
    --red: #a13131;
    --radius: 10px;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    padding: 2rem 2.5vw;
    background: var(--bg);
    font-family: var(--font-sans);
    color: var(--text-primary);
  }
  #app { width: 100%; }
  h1 { font-size: 20px; font-weight: 600; margin: 0 0 1.5rem; text-align: center; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
    width: 100%;
  }
  .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .month-nav button {
    width: 36px; height: 36px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--surface);
    font-size: 16px; cursor: pointer; color: var(--text-primary);
  }
  .month-nav button:hover { background: var(--bg); border-color: var(--border-strong); }
  #monthLabel { font-size: 18px; font-weight: 600; }
  .hint { text-align: center; font-size: 12px; color: var(--text-muted); margin: -8px 0 14px; }
  #weekHeader, #grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 6px; }
  #weekHeader div {
    text-align: center; font-size: 12px; color: var(--text-muted);
    padding: 2px 0 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em;
  }
  .day-cell {
    min-height: 12vh; border-radius: var(--radius); padding: 8px;
    cursor: pointer; border: 1px solid var(--border);
    transition: background 0.1s; overflow: hidden;
  }
  .day-cell:hover { background: var(--bg); }
  .day-cell.selected { background: var(--accent-bg); border-color: var(--accent); }
  .day-cell.dragover { border-color: var(--accent); border-style: dashed; background: var(--accent-bg); }
  .day-cell.empty { border-color: transparent; cursor: default; }
  .day-cell.empty:hover { background: none; }
  .day-num { font-size: 13px; margin-bottom: 5px; }
  .day-num.today { color: var(--accent-text); font-weight: 700; }
  .chip-list { display: flex; flex-direction: column; gap: 3px; }
  .chip {
    display: flex; align-items: center; gap: 4px; font-size: 11px; line-height: 15px;
    padding: 2px 8px; border-radius: 999px; max-width: 100%; cursor: grab;
  }
  .chip:active { cursor: grabbing; }
  .chip.event-chip { background: transparent !important; border: 1.5px dashed currentColor; padding: 1px 8px; }
  .chip input[type="checkbox"] { width: 12px; height: 12px; flex-shrink: 0; margin: 0; cursor: pointer; }
  .chip-icon { width: 12px; height: 12px; flex-shrink: 0; text-align: center; font-size: 11px; line-height: 12px; opacity: 0.8; }
  .chip-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .chip-text.done { text-decoration: line-through; opacity: 0.6; }
  .chip-more { font-size: 11px; color: var(--text-muted); padding: 0 6px; cursor: pointer; }
  #panelHeading, .modal-heading { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
  .type-toggle { display: flex; gap: 6px; margin-bottom: 10px; }
  .type-btn {
    flex: 1; padding: 8px; border-radius: var(--radius); border: 1px solid var(--border);
    background: var(--surface); cursor: pointer; font-size: 13px; color: var(--text-secondary); font-family: var(--font-sans);
  }
  .type-btn.active { border-color: var(--accent); color: var(--accent-text); background: var(--accent-bg); font-weight: 600; }
  .todo-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap;
    cursor: grab; border-radius: var(--radius); padding: 2px; transition: background 0.1s;
  }
  .todo-row:hover { background: var(--bg); }
  .todo-row.dragging { opacity: 0.4; }
  .todo-row.rowdragover { box-shadow: inset 0 2px 0 var(--accent); }
  .todo-row input[type="checkbox"] { width: 17px; height: 17px; flex-shrink: 0; accent-color: var(--accent); cursor: pointer; }
  .row-spacer { width: 17px; height: 17px; flex-shrink: 0; text-align: center; font-size: 13px; color: var(--text-muted); }
  .drag-handle { width: 14px; flex-shrink: 0; text-align: center; color: var(--text-muted); font-size: 13px; user-select: none; }
  .todo-bubble {
    flex: 1; font-size: 14px; padding: 6px 12px; border-radius: 999px;
    word-break: break-word; min-width: 0; cursor: text;
  }
  .todo-bubble.done { text-decoration: line-through; opacity: 0.55; }
  .todo-bubble.event-bubble { background: transparent !important; border: 1.5px dashed currentColor; }
  .edit-input {
    flex: 1; font-size: 14px; padding: 6px 12px; border-radius: 999px;
    border: 1px solid var(--accent); font-family: var(--font-sans); min-width: 0;
  }
  .edit-input:focus { outline: none; }
  .swatch-btn {
    width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border-strong);
    cursor: pointer; flex-shrink: 0; padding: 0;
  }
  .todo-row button.icon-btn {
    width: 26px; height: 26px; border-radius: 6px; border: none; background: none;
    color: var(--text-muted); cursor: pointer; font-size: 15px; flex-shrink: 0;
  }
  .todo-row button.icon-btn:hover { background: var(--surface); color: var(--accent-text); }
  .color-picker { display: flex; gap: 6px; width: 100%; padding: 4px 0 8px 25px; }
  .color-dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
  .color-dot.active { border-color: var(--text-primary); }
  .empty-note { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
  .add-row { display: flex; gap: 8px; margin-top: 4px; }
  .add-row input[type="text"] {
    flex: 1; height: 38px; border-radius: var(--radius); border: 1px solid var(--border);
    padding: 0 10px; font-size: 14px; font-family: var(--font-sans);
  }
  .add-row input[type="text"]:focus { outline: none; border-color: var(--accent); }
  .add-row button.submit-btn {
    width: 38px; height: 38px; border-radius: var(--radius); border: none;
    background: var(--accent); color: white; font-size: 18px; cursor: pointer; flex-shrink: 0;
  }
  .add-row button.submit-btn:hover { opacity: 0.9; }

  .sync-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .sync-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
  .sync-sub a { color: var(--accent-text); }
  .sync-status { display: flex; align-items: flex-start; gap: 6px; font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
  .sync-status span:last-child { word-break: break-word; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
  .status-dot.synced { background: var(--green); }
  .status-dot.error { background: var(--red); }
  .status-dot.syncing { background: var(--accent); }
  .sync-code-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .sync-code-box {
    font-family: var(--font-mono); font-size: 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 12px; word-break: break-all; flex: 1; min-width: 160px;
  }
  .sync-btn {
    height: 38px; padding: 0 14px; border-radius: var(--radius); border: 1px solid var(--border);
    background: var(--surface); cursor: pointer; font-size: 13px; color: var(--text-primary);
    font-family: var(--font-sans); white-space: nowrap;
  }
  .sync-btn:hover { background: var(--bg); border-color: var(--border-strong); }
  .sync-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .sync-btn.primary:hover { opacity: 0.9; }
  .sync-join-row { display: flex; gap: 8px; margin-top: 4px; }
  .sync-join-row input[type="text"] {
    flex: 1; height: 38px; border-radius: var(--radius); border: 1px solid var(--border);
    padding: 0 10px; font-size: 13px; font-family: var(--font-mono);
  }
  .sync-join-row input[type="text"]:focus { outline: none; border-color: var(--accent); }
  .sync-divider { border-top: 1px solid var(--border); margin: 14px 0; }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(38,38,36,0.45);
    align-items: center; justify-content: center; z-index: 1000; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--surface); border-radius: 14px; padding: 1.25rem;
    width: 100%; max-width: 480px; max-height: 82vh; overflow-y: auto;
  }
  .modal-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .modal-close {
    width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--surface); cursor: pointer; font-size: 15px; color: var(--text-secondary); flex-shrink: 0;
  }
  .modal-close:hover { background: var(--bg); }
</style>
</head>
<body>
<div id="app">
  <h1>To-do calendar</h1>
  <div class="card">
    <div class="month-nav">
      <button id="prevBtn" aria-label="Previous month">&#8249;</button>
      <div id="monthLabel"></div>
      <button id="nextBtn" aria-label="Next month">&#8250;</button>
    </div>
    <div class="hint">Double-click a day to expand it. Drag an item onto another day to move it.</div>
    <div id="weekHeader"></div>
    <div id="grid"></div>
  </div>
  <div class="card" id="dayPanel"></div>
  <div class="card" id="syncCard"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox">
    <div class="modal-top">
      <div class="modal-heading" id="modalHeading"></div>
      <button class="modal-close" id="modalCloseBtn" aria-label="Close">&#10005;</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
(function () {
  var STORAGE_KEY = 'todoCalendarData';
  var SYNC_KEY = 'todoCalendarSync';
  var GIST_BASE = 'https://api.github.com/gists';
  var GIST_FILENAME = 'todo-calendar-data.json';

  var todos = {};
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) todos = JSON.parse(saved);
  } catch (e) {
    todos = {};
  }

  var syncInfo = null;
  try {
    var savedSync = localStorage.getItem(SYNC_KEY);
    if (savedSync) syncInfo = JSON.parse(savedSync);
  } catch (e) {
    syncInfo = null;
  }
  var syncStatus = syncInfo ? 'syncing' : 'idle';
  var syncMessage = '';

  var COLORS = {
    gray:   { bg: '#ece9e3', text: '#57554f' },
    red:    { bg: '#fadcdc', text: '#a13131' },
    orange: { bg: '#fbe3cf', text: '#a1591b' },
    yellow: { bg: '#faf0c9', text: '#8a6d16' },
    green:  { bg: '#dcefda', text: '#2f7a3c' },
    blue:   { bg: '#dbe8fb', text: '#2b5fa8' },
    purple: { bg: '#e8e0f8', text: '#5b3fa0' },
    pink:   { bg: '#fbe0ec', text: '#a13f74' }
  };
  var COLOR_ORDER = ['gray','red','orange','yellow','green','blue','purple','pink'];
  var DEFAULT_TODO_COLOR = 'blue';
  var DEFAULT_EVENT_COLOR = 'gray';

  var today = new Date();
  var viewYear = today.getFullYear();
  var viewMonth = today.getMonth();
  var selectedKey = fmtKey(today);
  var modalKey = null;
  var idCounter = Date.now();
  var openPickerId = null;
  var editingId = null;
  var addType = 'todo';
  var dragChipData = null;

  function fmtKey(d) {
    return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
  }

  function saveLocal() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(todos)); } catch (e) {}
  }

  function save() {
    saveLocal();
    if (syncInfo) pushToRemote();
  }

  function refreshAll() {
    render();
    if (modalKey) renderModal();
  }

  function setSyncStatus(status, message) {
    syncStatus = status;
    syncMessage = message || '';
    renderSyncPanel();
  }

  function pushToRemote() {
    if (!syncInfo) return;
    setSyncStatus('syncing');
    fetch(GIST_BASE + '/' + syncInfo.gistId, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + syncInfo.token,
        'Accept': 'application/vnd.github+json'
      },
      body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(todos) } } })
    }).then(function (res) {
      if (!res.ok) return res.text().then(function (t) { throw new Error('Status ' + res.status + (t ? ': ' + t.slice(0, 200) : '')); });
      setSyncStatus('synced');
    }).catch(function (err) {
      console.error('Sync push error:', err);
      setSyncStatus('error', 'Push failed: ' + (err && err.message ? err.message : 'unknown error') + ' (see browser console)');
    });
  }

  function pullFromRemote(silent) {
    if (!syncInfo) return;
    if (!silent) setSyncStatus('syncing');
    fetch(GIST_BASE + '/' + syncInfo.gistId, {
      headers: {
        'Authorization': 'Bearer ' + syncInfo.token,
        'Accept': 'application/vnd.github+json'
      }
    })
      .then(function (res) {
        if (!res.ok) return res.text().then(function (t) { throw new Error('Status ' + res.status + (t ? ': ' + t.slice(0, 200) : '')); });
        return res.json();
      })
      .then(function (data) {
        var file = data.files && data.files[GIST_FILENAME];
        var parsed = {};
        if (file && file.content) {
          try { parsed = JSON.parse(file.content); } catch (e) { parsed = {}; }
        }
        todos = parsed && typeof parsed === 'object' ? parsed : {};
        saveLocal();
        setSyncStatus('synced');
        refreshAll();
      })
      .catch(function (err) {
        console.error('Sync pull error:', err);
        setSyncStatus('error', 'Load failed: ' + (err && err.message ? err.message : 'unknown error') + ' (see browser console)');
      });
  }

  function createSyncCode(token) {
    var trimmedToken = (token || '').trim();
    if (!trimmedToken) {
      setSyncStatus('error', 'Paste your GitHub personal access token first.');
      return;
    }
    setSyncStatus('syncing');
    fetch(GIST_BASE, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + trimmedToken,
        'Accept': 'application/vnd.github+json'
      },
      body: JSON.stringify({
        description: 'To-do calendar sync data',
        public: false,
        files: { [GIST_FILENAME]: { content: JSON.stringify(todos) } }
      })
    }).then(function (res) {
      if (!res.ok) return res.text().then(function (t) { throw new Error('Status ' + res.status + (t ? ': ' + t.slice(0, 200) : '')); });
      return res.json();
    }).then(function (data) {
      if (!data || !data.id) throw new Error('Response was missing a gist id');
      syncInfo = { gistId: data.id, token: trimmedToken };
      try { localStorage.setItem(SYNC_KEY, JSON.stringify(syncInfo)); } catch (e) {}
      setSyncStatus('synced');
    }).catch(function (err) {
      console.error('Sync create error:', err);
      setSyncStatus('error', 'Create failed: ' + (err && err.message ? err.message : 'unknown error') + ' (see browser console)');
    });
  }

  function connectSyncCode(rawCode) {
    var trimmed = rawCode.trim();
    if (!trimmed) return;
    var idx = trimmed.indexOf('::');
    if (idx === -1) {
      setSyncStatus('error', "That code doesn't look right. Copy the full code from the other device.");
      return;
    }
    var gistId = trimmed.slice(0, idx);
    var token = trimmed.slice(idx + 2);
    if (!gistId || !token) {
      setSyncStatus('error', "That code doesn't look right. Copy the full code from the other device.");
      return;
    }
    syncInfo = { gistId: gistId, token: token };
    try { localStorage.setItem(SYNC_KEY, JSON.stringify(syncInfo)); } catch (e) {}
    pullFromRemote(false);
  }

  function disconnectSync() {
    syncInfo = null;
    try { localStorage.removeItem(SYNC_KEY); } catch (e) {}
    setSyncStatus('idle');
  }

  function toggleDone(key, id, val) {
    var list = todos[key] || [];
    for (var i = 0; i < list.length; i++) {
      if (list[i].id === id) { list[i].done = val; break; }
    }
    save();
  }

  function moveItemToDay(fromKey, itemId, toKey) {
    if (fromKey === toKey) return;
    var fromList = todos[fromKey] || [];
    var idx = -1;
    for (var i = 0; i < fromList.length; i++) {
      if (fromList[i].id === itemId) { idx = i; break; }
    }
    if (idx === -1) return;
    var item = fromList.splice(idx, 1)[0];
    if (!todos[toKey]) todos[toKey] = [];
    todos[toKey].push(item);
    save();
  }

  function render() {
    document.getElementById('monthLabel').textContent = monthName(viewMonth) + ' ' + viewYear;

    var weekHeader = document.getElementById('weekHeader');
    weekHeader.innerHTML = '';
    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(function (d) {
      var el = document.createElement('div');
      el.textContent = d;
      weekHeader.appendChild(el);
    });

    var grid = document.getElementById('grid');
    grid.innerHTML = '';
    var firstDay = new Date(viewYear, viewMonth, 1);
    var startOffset = firstDay.getDay();
    var daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    var totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;

    for (var c = 0; c < totalCells; c++) {
      let dayNum = c - startOffset + 1;
      let cell = document.createElement('div');
      cell.className = 'day-cell';

      if (dayNum < 1 || dayNum > daysInMonth) {
        cell.classList.add('empty');
        grid.appendChild(cell);
        continue;
      }

      let cellDate = new Date(viewYear, viewMonth, dayNum);
      let key = fmtKey(cellDate);
      let isToday = fmtKey(today) === key;
      let isSelected = selectedKey === key;
      let list = todos[key] || [];

      if (isSelected) cell.classList.add('selected');
      cell.setAttribute('data-key', key);

      var numEl = document.createElement('div');
      numEl.className = 'day-num' + (isToday ? ' today' : '');
      numEl.textContent = dayNum;
      cell.appendChild(numEl);

      if (list.length > 0) {
        let chipList = document.createElement('div');
        chipList.className = 'chip-list';
        let maxShow = 4;
        for (let i = 0; i < Math.min(list.length, maxShow); i++) {
          let item = list[i];
          let colorKey = item.color || (item.type === 'event' ? DEFAULT_EVENT_COLOR : DEFAULT_TODO_COLOR);
          let colorDef = COLORS[colorKey] || COLORS[DEFAULT_TODO_COLOR];
          let chip = document.createElement('div');
          chip.className = 'chip' + (item.type === 'event' ? ' event-chip' : '');
          chip.draggable = true;
          if (item.type === 'event') {
            chip.style.color = colorDef.text;
          } else {
            chip.style.background = colorDef.bg;
            chip.style.color = colorDef.text;
          }

          chip.addEventListener('dragstart', function (e) {
            e.stopPropagation();
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', JSON.stringify({ fromKey: key, id: item.id }));
          });

          if (item.type === 'event') {
            let icon = document.createElement('span');
            icon.className = 'chip-icon';
            icon.textContent = '\u2013';
            icon.setAttribute('aria-hidden', 'true');
            chip.appendChild(icon);
          } else {
            let cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.checked = item.done;
            let thisKey = key;
            let thisId = item.id;
            cb.addEventListener('click', function (e) { e.stopPropagation(); });
            cb.addEventListener('change', function () {
              toggleDone(thisKey, thisId, cb.checked);
              refreshAll();
            });
            chip.appendChild(cb);
          }

          let textSpan = document.createElement('span');
          textSpan.className = 'chip-text' + (item.type !== 'event' && item.done ? ' done' : '');
          textSpan.textContent = item.text;
          chip.appendChild(textSpan);

          chipList.appendChild(chip);
        }
        if (list.length > maxShow) {
          let more = document.createElement('div');
          more.className = 'chip-more';
          more.textContent = '+' + (list.length - maxShow) + ' more';
          more.addEventListener('click', function (e) {
            e.stopPropagation();
            openModal(key);
          });
          chipList.appendChild(more);
        }
        cell.appendChild(chipList);
      }

      cell.addEventListener('click', function () {
        selectedKey = this.getAttribute('data-key');
        openPickerId = null;
        editingId = null;
        render();
      });

      cell.addEventListener('dblclick', function () {
        openModal(this.getAttribute('data-key'));
      });

      cell.addEventListener('dragover', function (e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        this.classList.add('dragover');
      });
      cell.addEventListener('dragleave', function () {
        this.classList.remove('dragover');
      });
      cell.addEventListener('drop', function (e) {
        e.preventDefault();
        this.classList.remove('dragover');
        var raw = e.dataTransfer.getData('text/plain');
        if (!raw) return;
        try {
          var data = JSON.parse(raw);
          if (data && data.fromKey && data.id) {
            moveItemToDay(data.fromKey, data.id, this.getAttribute('data-key'));
            refreshAll();
          }
        } catch (err) {}
      });

      grid.appendChild(cell);
    }

    renderDayPanel();
    renderSyncPanel();
  }

  function monthName(m) {
    var names = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    return names[m];
  }

  function dayHeadingText(key) {
    var parts = key.split('-');
    var d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
    var dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    return dayNames[d.getDay()] + ', ' + monthNames[d.getMonth()] + ' ' + d.getDate();
  }

  function buildItemRow(item, dayKey, list, index) {
    var isEvent = item.type === 'event';
    var colorKey = item.color || (isEvent ? DEFAULT_EVENT_COLOR : DEFAULT_TODO_COLOR);
    var colorDef = COLORS[colorKey] || COLORS[DEFAULT_TODO_COLOR];

    var row = document.createElement('div');
    row.className = 'todo-row';
    row.draggable = true;

    row.addEventListener('dragstart', function (e) {
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', JSON.stringify({ reorder: true, key: dayKey, index: index }));
    });
    row.addEventListener('dragend', function () { row.classList.remove('dragging'); });
    row.addEventListener('dragover', function (e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      row.classList.add('rowdragover');
    });
    row.addEventListener('dragleave', function () { row.classList.remove('rowdragover'); });
    row.addEventListener('drop', function (e) {
      e.preventDefault();
      e.stopPropagation();
      row.classList.remove('rowdragover');
      var raw = e.dataTransfer.getData('text/plain');
      if (!raw) return;
      try {
        var data = JSON.parse(raw);
        if (data && data.reorder && data.key === dayKey) {
          var arr = todos[dayKey];
          var moved = arr.splice(data.index, 1)[0];
          arr.splice(index, 0, moved);
          save();
          refreshAll();
        }
      } catch (err) {}
    });

    var handle = document.createElement('div');
    handle.className = 'drag-handle';
    handle.textContent = '\u22ee\u22ee';
    handle.setAttribute('aria-hidden', 'true');
    row.appendChild(handle);

    if (isEvent) {
      var spacer = document.createElement('div');
      spacer.className = 'row-spacer';
      spacer.textContent = '\u2013';
      spacer.setAttribute('aria-hidden', 'true');
      row.appendChild(spacer);
    } else {
      var cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = item.done;
      cb.addEventListener('change', function () {
        item.done = cb.checked;
        save();
        refreshAll();
      });
      row.appendChild(cb);
    }

    var swatchBtn = document.createElement('button');
    swatchBtn.className = 'swatch-btn';
    swatchBtn.style.background = colorDef.bg;
    swatchBtn.setAttribute('aria-label', 'Change color');
    swatchBtn.addEventListener('click', function () {
      openPickerId = (openPickerId === item.id) ? null : item.id;
      editingId = null;
      refreshAll();
    });
    row.appendChild(swatchBtn);

    if (editingId === item.id) {
      var editInput = document.createElement('input');
      editInput.type = 'text';
      editInput.className = 'edit-input';
      editInput.value = item.text;
      row.appendChild(editInput);
      setTimeout(function () { editInput.focus(); editInput.select(); }, 0);

      function commitEdit() {
        var val = editInput.value.trim();
        if (val) item.text = val;
        editingId = null;
        save();
        refreshAll();
      }
      editInput.addEventListener('blur', commitEdit);
      editInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') { e.preventDefault(); commitEdit(); }
        if (e.key === 'Escape') { editingId = null; refreshAll(); }
      });
      editInput.addEventListener('click', function (e) { e.stopPropagation(); });
    } else {
      var bubble = document.createElement('span');
      bubble.className = 'todo-bubble' + (!isEvent && item.done ? ' done' : '') + (isEvent ? ' event-bubble' : '');
      if (isEvent) {
        bubble.style.color = colorDef.text;
      } else {
        bubble.style.background = colorDef.bg;
        bubble.style.color = colorDef.text;
      }
      bubble.textContent = item.text;
      bubble.addEventListener('dblclick', function (e) {
        e.stopPropagation();
        openPickerId = null;
        editingId = item.id;
        refreshAll();
      });
      row.appendChild(bubble);
    }

    var delBtn = document.createElement('button');
    delBtn.className = 'icon-btn';
    delBtn.innerHTML = '&#10005;';
    delBtn.setAttribute('aria-label', 'Delete');
    delBtn.addEventListener('click', function () {
      todos[dayKey] = todos[dayKey].filter(function (t) { return t.id !== item.id; });
      save();
      refreshAll();
    });
    row.appendChild(delBtn);

    var wrapper = document.createElement('div');
    wrapper.appendChild(row);

    if (openPickerId === item.id) {
      var picker = document.createElement('div');
      picker.className = 'color-picker';
      COLOR_ORDER.forEach(function (ck) {
        var dot = document.createElement('span');
        dot.className = 'color-dot' + (ck === colorKey ? ' active' : '');
        dot.style.background = COLORS[ck].bg;
        dot.addEventListener('click', function () {
          item.color = ck;
          openPickerId = null;
          save();
          refreshAll();
        });
        picker.appendChild(dot);
      });
      wrapper.appendChild(picker);
    }

    return wrapper;
  }

  function buildDayBody(container, dayKey) {
    container.innerHTML = '';
    var list = todos[dayKey] || [];

    if (list.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'empty-note';
      empty.textContent = 'Nothing on this day yet.';
      container.appendChild(empty);
    } else {
      list.forEach(function (item, index) {
        container.appendChild(buildItemRow(item, dayKey, list, index));
      });
    }

    var typeToggle = document.createElement('div');
    typeToggle.className = 'type-toggle';

    var todoBtn = document.createElement('button');
    todoBtn.type = 'button';
    todoBtn.className = 'type-btn' + (addType === 'todo' ? ' active' : '');
    todoBtn.textContent = 'To-do';
    todoBtn.addEventListener('click', function () { addType = 'todo'; buildDayBody(container, dayKey); });
    typeToggle.appendChild(todoBtn);

    var eventBtn = document.createElement('button');
    eventBtn.type = 'button';
    eventBtn.className = 'type-btn' + (addType === 'event' ? ' active' : '');
    eventBtn.textContent = 'Event / blocked time';
    eventBtn.addEventListener('click', function () { addType = 'event'; buildDayBody(container, dayKey); });
    typeToggle.appendChild(eventBtn);

    container.appendChild(typeToggle);

    var addRow = document.createElement('div');
    addRow.className = 'add-row';

    var input = document.createElement('input');
    input.type = 'text';
    input.placeholder = addType === 'event' ? 'Describe the blocked time' : 'Add a to-do for this day';
    addRow.appendChild(input);

    var addBtn = document.createElement('button');
    addBtn.className = 'submit-btn';
    addBtn.innerHTML = '&#43;';
    addBtn.setAttribute('aria-label', 'Add');
    addRow.appendChild(addBtn);

    function addItem() {
      var val = input.value.trim();
      if (!val) return;
      if (!todos[dayKey]) todos[dayKey] = [];
      var newItem = { id: idCounter++, text: val, type: addType };
      if (addType === 'event') {
        newItem.color = DEFAULT_EVENT_COLOR;
      } else {
        newItem.done = false;
        newItem.color = DEFAULT_TODO_COLOR;
      }
      todos[dayKey].push(newItem);
      save();
      refreshAll();
    }

    addBtn.addEventListener('click', addItem);
    input.addEventListener('keydown', function (e) { if (e.key === 'Enter') addItem(); });

    container.appendChild(addRow);
  }

  function renderDayPanel() {
    var panel = document.getElementById('dayPanel');
    panel.innerHTML = '';
    var heading = document.createElement('div');
    heading.id = 'panelHeading';
    heading.textContent = dayHeadingText(selectedKey);
    panel.appendChild(heading);
    var body = document.createElement('div');
    panel.appendChild(body);
    buildDayBody(body, selectedKey);
  }

  function openModal(key) {
    modalKey = key;
    openPickerId = null;
    editingId = null;
    document.getElementById('modalOverlay').classList.add('open');
    renderModal();
  }

  function closeModal() {
    modalKey = null;
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function renderModal() {
    if (!modalKey) return;
    document.getElementById('modalHeading').textContent = dayHeadingText(modalKey);
    var body = document.getElementById('modalBody');
    buildDayBody(body, modalKey);
  }

  function renderSyncPanel() {
    var card = document.getElementById('syncCard');
    if (!card) return;
    card.innerHTML = '';

    var title = document.createElement('div');
    title.className = 'sync-title';
    title.textContent = 'Sync across devices';
    card.appendChild(title);

    var statusRow = document.createElement('div');
    statusRow.className = 'sync-status';
    var dot = document.createElement('span');
    dot.className = 'status-dot' + (syncStatus === 'synced' ? ' synced' : syncStatus === 'error' ? ' error' : syncStatus === 'syncing' ? ' syncing' : '');
    statusRow.appendChild(dot);
    var statusText = document.createElement('span');
    if (syncStatus === 'idle') statusText.textContent = 'Not syncing yet, this device only.';
    else if (syncStatus === 'syncing') statusText.textContent = 'Syncing...';
    else if (syncStatus === 'synced') statusText.textContent = 'Synced';
    else if (syncStatus === 'error') statusText.textContent = syncMessage || 'Sync error';
    statusRow.appendChild(statusText);
    card.appendChild(statusRow);

    if (syncInfo) {
      var sub = document.createElement('div');
      sub.className = 'sync-sub';
      sub.textContent = 'Paste this full code on another device to see the same calendar there.';
      card.appendChild(sub);

      var codeRow = document.createElement('div');
      codeRow.className = 'sync-code-row';

      var codeBox = document.createElement('div');
      codeBox.className = 'sync-code-box';
      var fullCode = syncInfo.gistId + '::' + syncInfo.token;
      codeBox.textContent = fullCode;
      codeRow.appendChild(codeBox);

      var copyBtn = document.createElement('button');
      copyBtn.className = 'sync-btn';
      copyBtn.textContent = 'Copy code';
      copyBtn.addEventListener('click', function () {
        if (navigator.clipboard) {
          navigator.clipboard.writeText(fullCode).then(function () {
            copyBtn.textContent = 'Copied';
            setTimeout(function () { copyBtn.textContent = 'Copy code'; }, 1500);
          });
        }
      });
      codeRow.appendChild(copyBtn);

      var refreshBtn = document.createElement('button');
      refreshBtn.className = 'sync-btn';
      refreshBtn.textContent = 'Refresh now';
      refreshBtn.addEventListener('click', function () { pullFromRemote(false); });
      codeRow.appendChild(refreshBtn);

      var disconnectBtn = document.createElement('button');
      disconnectBtn.className = 'sync-btn';
      disconnectBtn.textContent = 'Turn off sync';
      disconnectBtn.addEventListener('click', disconnectSync);
      codeRow.appendChild(disconnectBtn);

      card.appendChild(codeRow);
    } else {
      var sub2 = document.createElement('div');
      sub2.className = 'sync-sub';
      sub2.innerHTML = 'Uses a private GitHub Gist to store your data. Create a token at ' +
        '<a href="https://github.com/settings/tokens/new?scopes=gist&description=todo-calendar-sync" target="_blank" rel="noopener">github.com/settings/tokens</a> ' +
        '(classic token, check only the "gist" scope), then paste it below.';
      card.appendChild(sub2);

      var tokenRow = document.createElement('div');
      tokenRow.className = 'sync-join-row';
      tokenRow.style.marginBottom = '10px';

      var tokenInput = document.createElement('input');
      tokenInput.type = 'password';
      tokenInput.placeholder = 'Paste GitHub token (starts with ghp_ or github_pat_)';
      tokenRow.appendChild(tokenInput);

      var createBtn = document.createElement('button');
      createBtn.className = 'sync-btn primary';
      createBtn.textContent = 'Create sync code';
      createBtn.addEventListener('click', function () { createSyncCode(tokenInput.value); });
      tokenRow.appendChild(createBtn);

      tokenInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') createSyncCode(tokenInput.value);
      });

      card.appendChild(tokenRow);

      var divider = document.createElement('div');
      divider.className = 'sync-divider';
      card.appendChild(divider);

      var joinLabel = document.createElement('div');
      joinLabel.className = 'sync-sub';
      joinLabel.style.marginBottom = '6px';
      joinLabel.textContent = 'Already have a code from another device?';
      card.appendChild(joinLabel);

      var joinRow = document.createElement('div');
      joinRow.className = 'sync-join-row';

      var joinInput = document.createElement('input');
      joinInput.type = 'text';
      joinInput.placeholder = 'Paste sync code';
      joinRow.appendChild(joinInput);

      var joinBtn = document.createElement('button');
      joinBtn.className = 'sync-btn';
      joinBtn.textContent = 'Connect';
      joinBtn.addEventListener('click', function () { connectSyncCode(joinInput.value); });
      joinRow.appendChild(joinBtn);

      joinInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') connectSyncCode(joinInput.value);
      });

      card.appendChild(joinRow);
    }
  }

  document.getElementById('prevBtn').addEventListener('click', function () {
    viewMonth -= 1;
    if (viewMonth < 0) { viewMonth = 11; viewYear -= 1; }
    render();
  });

  document.getElementById('nextBtn').addEventListener('click', function () {
    viewMonth += 1;
    if (viewMonth > 11) { viewMonth = 0; viewYear += 1; }
    render();
  });

  document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', function (e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && modalKey) closeModal();
  });

  render();

  if (syncInfo) pullFromRemote(true);

  setInterval(function () {
    if (syncInfo) pullFromRemote(true);
  }, 45000);
})();
</script>
</body>
</html>
